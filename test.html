<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор типа анализа (Тест полного экрана)</title>
    <!-- Загружаем новые стили проекта -->
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="form.css">
    <style>
        body {
            /* Переопределяем body для центрирования в тестовом файле */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Дополнительные стили для карточек тарифов (в будущем добавим в form.css) */
        .plan-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .plan-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-main);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        .plan-card input[type="radio"] {
            display: none;
        }

        .plan-card input[type="radio"]:checked+.card-content-wrapper {
            opacity: 1;
        }

        .plan-card.selected {
            border-color: var(--color-green);
        }

        .check-circle {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .check-circle svg {
            width: 14px;
            height: 14px;
            color: transparent;
            stroke-width: 3px;
            transition: 0.2s;
        }

        .plan-card.selected .check-circle {
            background-color: var(--color-green);
            border-color: var(--color-green);
        }

        .plan-card.selected .check-circle svg {
            color: var(--bg-main);
        }

        .card-content-wrapper {
            flex: 1;
            padding-right: 30px;
        }

        .plan-title {
            font-size: 16px;
            font-weight: 500;
            margin: 0 0 4px 0;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .plan-badge {
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .plan-card.selected .plan-badge {
            background: var(--color-green);
            color: #000;
        }

        .plan-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.4;
        }

        @media (prefers-color-scheme: light) {
            .plan-card.selected .plan-badge {
                color: #fff;
            }

            .plan-card.selected .check-circle svg {
                color: #fff;
            }
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Анализ осанки</h2>

        <!-- Стандартные поля анкеты -->
        <div class="input-group">
            <input type="number" id="user-age" placeholder="Возраст" inputmode="numeric" min="1" max="120" required>
            <div class="field-error" id="age-error" aria-live="polite"></div>

            <input type="number" id="user-weight" placeholder="Вес (кг)" inputmode="numeric" min="20" max="300"
                required>
            <div class="field-error" id="weight-error" aria-live="polite"></div>

            <input type="number" id="user-height" placeholder="Рост (см)" inputmode="numeric" min="50" max="250"
                required>
            <div class="field-error" id="height-error" aria-live="polite"></div>

            <div class="gender-toggle">
                <input type="radio" id="gender-male" name="gender" value="male" checked>
                <label for="gender-male">Муж.</label>

                <input type="radio" id="gender-female" name="gender" value="female">
                <label for="gender-female">Жен.</label>
            </div>
        </div>

        <label class="helper-switch">
            <div class="helper-switch-text">
                <strong>Съемка со стороны</strong>
                <span>Добавит 4-й ракурс со спины</span>
            </div>
            <input type="checkbox" id="has-helper">
            <span class="slider"></span>
        </label>

        <!-- БЛОК ВЫБОРА ТИПА АНАЛИЗА -->
        <div class="plan-options">
            <!-- БАЗОВЫЙ ПЛАН -->
            <label class="plan-card selected" id="card-basic">
                <input type="radio" name="analysis_type" value="basic" checked onchange="updateSelection()">
                <div class="card-content-wrapper">
                    <h3 class="plan-title">ИИ-Диагностика <span class="plan-badge"
                            style="background:transparent; border:1px solid #333;">BASIC</span></h3>
                    <p class="plan-desc">Анализ фотографий с помощью нейросети и автоматический подбор упражнений</p>
                </div>
                <div class="check-circle">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"></path>
                    </svg>
                </div>
            </label>

            <!-- ПРЕМИУМ ПЛАН -->
            <label class="plan-card" id="card-premium">
                <input type="radio" name="analysis_type" value="premium" onchange="updateSelection()">
                <div class="card-content-wrapper">
                    <h3 class="plan-title">Экспертный Контроль <span class="plan-badge">PREMIUM</span></h3>
                    <p class="plan-desc">Анализ фотографий и подбор упражнений под контролем сертифицированного специалиста.</p>
                </div>
                <div class="check-circle">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"></path>
                    </svg>
                </div>
            </label>
        </div>

        <button id="to-camera-btn" class="primary-btn" onclick="alert('Выбран: ' + document.querySelector('input[name=analysis_type]:checked').value)">НАЧАТЬ</button>
    </div>

    <script>
        function updateSelection() {
            const radios = document.getElementsByName('analysis_type');
            const cardBasic = document.getElementById('card-basic');
            const cardPremium = document.getElementById('card-premium');

            let selectedValue = 'basic';
            radios.forEach(r => {
                if (r.checked) selectedValue = r.value;
            });

            if (selectedValue === 'basic') {
                cardBasic.classList.add('selected');
                cardPremium.classList.remove('selected');
            } else {
                cardPremium.classList.add('selected');
                cardBasic.classList.remove('selected');
            }
        }
    </script>

</body>

</html>
